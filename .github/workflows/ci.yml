name: CI

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: GCC-13
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-latest
            compiler: Clang-17
            cc: clang-17
            cxx: clang++-17
          - os: windows-latest
            compiler: MSVC-latest
            cc: ""
            cxx: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13 (Ubuntu)
        if: matrix.compiler == 'GCC-13'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 ninja-build

      - name: Install Clang 17 (Ubuntu)
        if: matrix.compiler == 'Clang-17'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17 ninja-build

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset debug

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug

      - name: Test
        run: ctest --preset debug

  sanitize:
    name: Sanitizers (GCC-13, Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13 and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 ninja-build

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: cmake --preset sanitize

      - name: Build
        run: cmake --build --preset sanitize

      - name: Test
        run: ctest --preset sanitize
